# ─────────────────────────────────────────────────────────────────────────────
# go-server-monitor — example configuration (P0 skeleton template).
#
# Copy to config.yaml and adjust. Resolution order (REQ-PLAN-03, P0 deliverable 3):
#   command-line flags  >  environment variables (.env)  >  config.yaml  >  built-in defaults
#
# Secrets (api_secret, admin password, jwt_secret) are intentionally NOT in this
# file — they come from .env on first start and then live in the DB settings
# table (REQ-RES-01/05). This file holds non-secret runtime tuning only.
#
# Authority: requirements/01-architecture.md (REQ-ARCH-03 recommended config),
#            requirements/07-scheduled-notifications.md / 12-build-plan.md (P7 cron),
#            requirements/14-resolved-decisions.md (retention, descampling).
#
# NOTE(P0): these values are documented defaults. The actual config struct and
# loader land in internal/config (P0/P1); fields here mirror the intended shape.
# ─────────────────────────────────────────────────────────────────────────────

server:
  # HTTP listen address (host:port). Empty host = all interfaces.
  listen_addr: ":8080"
  # Public domain (used by Caddy for automatic HTTPS; informational here).
  domain: "localhost"

db:
  # Backend selected by URL scheme (internal/store, docs/database.md):
  #   sqlite:./data/metrics.db  -> embedded SQLite (modernc, no cgo)
  #   libsql://<db>.turso.io    -> Turso / libSQL (remote; auth_token below or in URL)
  #   postgres://...            -> PostgreSQL (extension point; needs pgx build)
  # Empty url => fall back to the SQLite file at `path`.
  url: ""
  auth_token: ""            # Turso/libSQL token if not embedded in url
  # SQLite file path. Used only when url is empty. Created on first start if absent.
  path: "./data/metrics.db"
  # History retention in days; nightly cron deletes older samples (REQ-RES-08).
  retention_days: 180

# SQLite PRAGMA tuning baseline (CONVENTIONS §8, REQ-ARCH-03, REQ-DB-01).
# Applied only to the embedded SQLite / libSQL backends.
sqlite:
  journal_mode: "WAL"      # read/write concurrency
  synchronous: "NORMAL"    # balance durability vs throughput
  busy_timeout: 5000       # ms to wait on a locked db before erroring
  cache_size: 10000        # pages (~40MB); keep modest under GOMEMLIMIT
  temp_store: "MEMORY"

# HTTP server timeouts (REQ-ARCH-03).
http:
  read_timeout: "10s"
  write_timeout: "30s"
  idle_timeout: "30s"

# In-process WebSocket Hub (REQ-ARCH-03, REQ-WS-08). Frozen path: GET /ws.
websocket:
  read_buffer: 4096
  write_buffer: 4096
  buffer_per_connection: 100   # per-client send queue depth (slow consumers dropped)
  ping_interval: "15s"
  pong_timeout: "30s"
  max_clients: 1000

# Cron schedules (robfig/cron 5-field expressions, UTC). Logic lands in P7.
cron:
  offline_check: "*/5 * * * *"   # offline detection every 5 minutes
  cleanup: "0 0 * * *"           # retention cleanup nightly at UTC 00:00
  expiration_reminder: "0 * * * *"  # expiry reminder hourly
  # Offline threshold = offline_factor x report_interval (REQ-RES-01).
  offline_factor: 5

# Notification placeholders (REQ-CRON-04). Real values live in the DB settings
# table and are edited via the admin UI; these are documentation placeholders.
notification:
  enabled: false
  telegram_bot_token: ""
  telegram_chat_id: ""
  webhook_url: ""
  webhook_timeout: "10s"
  webhook_max_retries: 3

# Logging.
log:
  level: "info"   # debug | info | warn | error
  format: "json"
